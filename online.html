<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataInsight v7.5 專家診斷版 - 客服首長戰情室</title>
    
    <!-- 1. 核心樣式與字體 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- 2. 核心庫 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            background-color: #f1f5f9; 
            margin: 0; padding: 0; color: #334155;
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 營運健康燈號 */
        .status-light { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
        .status-light-green { background: #22c55e; box-shadow: 0 0 12px rgba(34, 197, 94, 0.4); animation: pulse-green 2s infinite; }
        .status-light-yellow { background: #eab308; box-shadow: 0 0 12px rgba(234, 179, 8, 0.4); animation: pulse-yellow 2s infinite; }
        .status-light-red { background: #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); animation: pulse-red 1.5s infinite; }

        @keyframes pulse-green { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } }
        @keyframes pulse-yellow { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } }
        @keyframes pulse-red { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.6; } }

        .premium-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #e2e8f0;
            border-top: 4px solid #4f46e5; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased">
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-weight: 800; color: #64748b; font-size: 14px;">正在初始化專家診斷面板...</p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, 
            ResponsiveContainer, PieChart, Pie, Cell, LineChart, Line, AreaChart, Area, ReferenceLine 
        } = window.Recharts;

        // --- 常量配置 ---
        const ONLINE_ORDER = ['明星3缺1', '滿貫大亨', '捕魚大玩咖', '唯舞獨尊', '競技麻將2', '儲值專線', 'Vegas Frenzy', '大滿貫', '玩星派對', '幸運拉霸GO'];
        const ISSUE_TYPES = ["帳號問題", "伺服器相關問題", "儲值相關問題", "安裝、下載", "系統相關問題", "活動領獎問題", "規則設定問題", "反應與建議", "客戶服務", "行動版問題"];
        const COLORS = ['#6366f1', '#0ea5e9', '#f59e0b', '#ec4899', '#8b5cf6', '#10b981', '#f43f5e', '#64748b', '#06b6d4', '#4f46e5'];

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size, display: 'inline-block' }}></i>;
        };

        // --- 1. [新增] 靈活日期區間面板 (Date Range Panel) ---
        const DateRangePanel = ({ onRangeChange, availableDates, currentRange }) => {
            const [localRange, setLocalRange] = useState(currentRange);
            const quickOptions = [
                { label: '今日', days: 1 },
                { label: '昨日', days: 2, offset: 1 },
                { label: '近 7 日', days: 7 },
                { label: '近 30 日', days: 30 }
            ];

            const applyQuickRange = (opt) => {
                const dates = availableDates.slice(opt.offset || 0, (opt.offset || 0) + opt.days);
                if (dates.length) onRangeChange(dates);
            };

            return (
                <div className="flex flex-wrap items-center gap-4 bg-white/50 p-2 rounded-2xl border border-slate-200">
                    <div className="flex gap-1 ml-2">
                        {quickOptions.map(opt => (
                            <button 
                                key={opt.label}
                                onClick={() => applyQuickRange(opt)}
                                className="px-4 py-1.5 text-[11px] font-black rounded-xl hover:bg-white hover:shadow-sm transition-all text-slate-500 hover:text-indigo-600 border border-transparent hover:border-slate-100"
                            >
                                {opt.label}
                            </button>
                        ))}
                    </div>
                    <div className="h-6 w-px bg-slate-200 mx-1"></div>
                    <div className="flex items-center gap-3 px-4 py-1.5 bg-white rounded-xl shadow-sm border border-slate-100">
                        <Icon name="calendar" size={14} className="text-indigo-500" />
                        <span className="text-xs font-black text-slate-700 tabular-nums">
                            {currentRange.length > 1 ? `${currentRange[currentRange.length-1]} 至 ${currentRange[0]}` : currentRange[0]}
                        </span>
                        <span className="bg-indigo-50 text-indigo-600 text-[9px] px-2 py-0.5 rounded-full font-black">
                            共 {currentRange.length} 天
                        </span>
                    </div>
                </div>
            );
        };

        // --- 2. [新增] 情報搜尋 (Intelligence Search) ---
        const IntelligenceSearch = ({ database }) => {
            const [query, setQuery] = useState('');
            const [results, setResults] = useState([]);
            const [isOpen, setIsOpen] = useState(false);

            useEffect(() => {
                if (!query.trim()) { setResults([]); return; }
                const found = [];
                Object.entries(database).forEach(([date, dayData]) => {
                    const incidents = dayData.general?.majorIncidents || [];
                    const summary = dayData.general?.briefSummary || '';
                    if (summary.includes(query)) found.push({ date, content: summary, type: 'summary' });
                    incidents.forEach(inc => {
                        if (inc.summary.includes(query) || inc.description?.includes(query)) {
                            found.push({ date, content: inc.summary, type: 'incident', detail: inc.description });
                        }
                    });
                });
                setResults(found.sort((a,b) => b.date.localeCompare(a.date)).slice(0, 10));
            }, [query, database]);

            return (
                <div className="relative group lg:w-96">
                    <div className="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                        <Icon name="search" size={16} className="text-slate-400 group-focus-within:text-indigo-500 transition-colors" />
                    </div>
                    <input 
                        type="text" 
                        placeholder="搜尋歷史事件、決策紀錄..." 
                        className="w-full pl-12 pr-4 py-2.5 bg-slate-100/50 border border-transparent rounded-2xl text-xs font-black outline-none focus:bg-white focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-300 transition-all"
                        value={query}
                        onFocus={() => setIsOpen(true)}
                        onChange={(e) => setQuery(e.target.value)}
                    />
                    {isOpen && query && (
                        <div className="absolute right-0 top-full mt-3 w-full lg:w-[480px] bg-white rounded-[2rem] p-6 shadow-2xl border border-slate-100 z-[200] animate-fade-in">
                            <div className="flex justify-between items-center mb-4">
                                <h5 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">搜尋結果 ({results.length})</h5>
                                <button onClick={() => setIsOpen(false)}><Icon name="x" size={14} className="text-slate-300" /></button>
                            </div>
                            <div className="space-y-4 max-h-96 overflow-y-auto pr-2">
                                {results.length > 0 ? results.map((r, i) => (
                                    <div key={i} className="p-4 bg-slate-50 rounded-2xl border border-slate-100 hover:border-indigo-200 transition-all cursor-pointer">
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="text-[9px] font-black text-indigo-500 uppercase tracking-widest">{r.date}</span>
                                            <span className={`text-[8px] font-black px-2 py-0.5 rounded uppercase ${r.type==='incident'?'bg-rose-100 text-rose-600':'bg-emerald-100 text-emerald-600'}`}>{r.type}</span>
                                        </div>
                                        <p className="text-xs font-bold text-slate-800 leading-relaxed">{r.content}</p>
                                    </div>
                                )) : <p className="text-center py-10 text-xs font-black text-slate-300">查無相關歷史紀錄</p>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- 2.5 [新增] 統計卡片 (Stat Card) ---
        const StatCard = ({ title, value, iconName = "activity", gradient = "bg-indigo-600" }) => (
            <div className={`p-6 rounded-[2rem] text-white ${gradient} shadow-lg relative overflow-hidden card-hover`}>
                <div className="relative z-10 flex flex-col h-full justify-between gap-4">
                    <div className="flex justify-between items-start">
                        <span className="text-[10px] font-black uppercase tracking-widest opacity-80">{title}</span>
                        <Icon name={iconName} size={16} className="opacity-50" />
                    </div>
                    <div>
                        <div className="text-3xl font-black tabular-nums tracking-tighter">
                            {value ? value.toLocaleString() : 0}
                        </div>
                    </div>
                </div>
                {/* 裝飾背景 */}
                <div className="absolute -right-6 -bottom-6 opacity-10 rotate-12 scale-150 pointer-events-none">
                    <Icon name={iconName} size={100} />
                </div>
            </div>
        );

        // --- 3. [優化] 專案診斷卡 (Project Diagnostic Card) ---
        const ProjectDiagnosticCard = ({ name, data, color }) => {
            const isCritical = data.count > 115;
            const isWarning = data.count > 100 && data.count <= 115;
            
            return (
                <div className="bg-white rounded-[2.5rem] p-7 border border-slate-100 premium-shadow card-hover flex flex-col h-full">
                    <div className="flex justify-between items-start mb-6">
                        <div className="flex items-center gap-3">
                            <div className="w-3 h-3 rounded-full" style={{backgroundColor: color}}></div>
                            <h4 className="font-black text-lg text-slate-800 tracking-tight">{name}</h4>
                        </div>
                        <div className="text-right">
                            <span className="text-2xl font-black text-slate-900 tabular-nums">{data.count.toLocaleString()}</span>
                            <span className="text-[10px] text-slate-400 block font-black uppercase tracking-widest">Tickets</span>
                        </div>
                    </div>

                    <div className="space-y-4 flex-grow">
                        <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                            <div className="flex items-center gap-2 mb-2">
                                <Icon name="activity" size={12} className="text-indigo-500" />
                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">診斷重點 (Diagnosis)</span>
                            </div>
                            <p className="text-xs font-black text-slate-700 leading-relaxed">
                                {data.insight || "營運狀態健康，進線主要為一般諮詢。"}
                            </p>
                        </div>

                        <div className={`p-4 rounded-2xl border ${isCritical ? 'bg-rose-50 border-rose-100' : isWarning ? 'bg-amber-50 border-amber-100' : 'bg-emerald-50 border-emerald-100'}`}>
                            <div className="flex items-center gap-2 mb-2">
                                <Icon name="command" size={12} className={isCritical ? 'text-rose-500' : isWarning ? 'text-amber-500' : 'text-emerald-500'} />
                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">改善建議 (Action)</span>
                            </div>
                            <p className="text-xs font-bold text-slate-600 leading-relaxed">
                                {data.action || "無須特別動作，持續維持現有監控頻率。"}
                            </p>
                        </div>
                    </div>

                    <div className="mt-6 pt-4 border-t border-slate-50 flex justify-between items-center">
                        <div className="flex items-center gap-2">
                            <div className={`status-light ${isCritical ? 'status-light-red' : isWarning ? 'status-light-yellow' : 'status-light-green'}`}></div>
                            <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">
                                {isCritical ? '立即處理' : isWarning ? '加強關注' : '狀態穩定'}
                            </span>
                        </div>
                        <button className="text-[10px] font-black text-indigo-500 hover:text-indigo-700 uppercase tracking-widest flex items-center gap-1 group">
                            查看詳情 <Icon name="arrow-right" size={10} className="group-hover:translate-x-1 transition-transform" />
                        </button>
                    </div>
                </div>
            );
        };

        function App() {
            const [availableDates, setAvailableDates] = useState([]);
            const [selectedRange, setSelectedRange] = useState([]);
            const [database, setDatabase] = useState({});

            useEffect(() => {
                const db = {}; const startDate = new Date('2026-02-01');
                const tempDates = [];
                for (let i = 0; i < 45; i++) {
                    const d = new Date(startDate); d.setDate(startDate.getDate() + i); const dateStr = d.toISOString().split('T')[0];
                    tempDates.push(dateStr);
                    
                    const makeMockStats = (base) => ({ tickets: base + Math.floor(Math.random()*100), phoneCalls: 60, emails: 280, alertMails: 20, redmineReplies: 120 });
                    
                    let healthStatus = 'stable';
                    let briefSummary = '全產線運作正常，今日進線趨勢穩定。';
                    let actionPoints = ['例行監測各遊戲金流銜接狀況', '各專案回單速度維持在 1 小時內'];
                    let specialData = {};

                    if (dateStr === '2026-03-12') {
                        healthStatus = 'warning';
                        briefSummary = '明星3缺1 受新活動上線影響，領獎問題上升，建議加強分流。';
                        actionPoints = ['明星3缺1：活動系統延遲已回報研發及時排查', '儲值專線：外部金流維修中，已設置自動回覆導引'];
                        specialData = { 
                            '明星3缺1': { insight: '週年慶領獎機制延遲', action: '建議營運補發體力值，客服端啟用活動專屬標籤' },
                            '儲值專線': { insight: '遠傳電信外部金流維護中', action: '已掛官網紅字公告，減少進線壓力' }
                        };
                    } else if (dateStr === '2026-03-08') {
                        healthStatus = 'critical';
                        briefSummary = '伺服器主機群發生短暫斷連，影響範圍擴及全專案玩家登入。';
                        actionPoints = ['全專案：緊急重啟網路交換機，目前已恢復', '建議研發團隊針對 L3 交換機進行長線更換計劃'];
                        ONLINE_ORDER.forEach(g => specialData[g] = { insight: '受全案場斷連事件波及', action: '引導玩家重新登入，觀察連線穩定度' });
                    }

                    db[dateStr] = { general: { 
                        stats: makeMockStats(500), 
                        healthStatus, briefSummary, actionPoints,
                        gameStats: {} 
                    } };
                    ONLINE_ORDER.forEach(g => {
                        const count = 70 + Math.floor(Math.random()*60);
                        db[dateStr].general.gameStats[g] = { 
                            count, 
                            ...(specialData[g] || {}) 
                        };
                    });
                }
                const sortedDates = tempDates.sort().reverse();
                setDatabase(db); 
                setAvailableDates(sortedDates);
                setSelectedRange([sortedDates[0]]);
                setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 1000);
            }, []);

            // 聚合數據邏輯
            const aggregatedReport = useMemo(() => {
                if (!selectedRange.length || !database[selectedRange[0]]) return null;
                
                // 如果只選一天，直接返回
                if (selectedRange.length === 1) return database[selectedRange[0]].general;

                // 多天聚合
                const result = { 
                    stats: { tickets: 0, phoneCalls: 0, emails: 0, alertMails: 0, redmineReplies: 0 },
                    gameStats: {},
                    healthStatus: 'stable',
                    briefSummary: `選定區間 (${selectedRange.length} 天) 營運表現匯總分析。`,
                    actionPoints: []
                };

                selectedRange.forEach(date => {
                    const day = database[date]?.general;
                    if (!day) return;
                    Object.keys(result.stats).forEach(key => result.stats[key] += (day.stats[key] || 0));
                    if (day.healthStatus === 'critical') result.healthStatus = 'critical';
                    else if (day.healthStatus === 'warning' && result.healthStatus !== 'critical') result.healthStatus = 'warning';
                    
                    ONLINE_ORDER.forEach(g => {
                        if (!result.gameStats[g]) result.gameStats[g] = { count: 0, insight: '', action: '' };
                        const gDay = day.gameStats[g];
                        if (gDay) {
                            result.gameStats[g].count += gDay.count;
                            if (gDay.insight) result.gameStats[g].insight = gDay.insight;
                            if (gDay.action) result.gameStats[g].action = gDay.action;
                        }
                    });
                });

                // 平均化數據 (可選)
                Object.keys(result.stats).forEach(key => result.stats[key] = Math.round(result.stats[key] / selectedRange.length));
                ONLINE_ORDER.forEach(g => result.gameStats[g].count = Math.round(result.gameStats[g].count / selectedRange.length));
                result.briefSummary = `區間平均進線 ${result.stats.tickets} 件/日。狀態：${result.healthStatus==='stable'?'穩定':'有波動'}`;
                result.actionPoints = [`本週期平均處理率維持在 94%`, `共監測到 ${selectedRange.filter(d => database[d].general.healthStatus !== 'stable').length} 次營運異動`];

                return result;
            }, [selectedRange, database]);

            const chartData = useMemo(() => {
                if (!aggregatedReport) return [];
                return ONLINE_ORDER.map(name => ({ name, ...aggregatedReport.gameStats[name] })).sort((a,b) => b.count - a.count);
            }, [aggregatedReport]);

            return (
                <div className="min-h-screen pb-24">
                    <header className="sticky top-0 z-50 glass-panel border-b border-slate-200/80 h-24 flex items-center shadow-sm">
                        <div className="max-w-screen-2xl mx-auto px-8 w-full flex flex-col lg:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-5">
                                <div className="bg-slate-900 p-3 rounded-2xl shadow-xl rotate-3"><Icon name="shield-check" className="text-white" size={28} /></div>
                                <div>
                                    <h1 className="font-black text-2xl tracking-tighter text-slate-900 leading-none">DataInsight <span className="text-indigo-600">v7.5 專家版</span></h1>
                                    <p className="text-[9px] text-slate-400 font-black tracking-[0.2em] uppercase mt-1.5">Executive Diagnostic Dashboard</p>
                                </div>
                            </div>
                            
                            <div className="flex flex-col lg:flex-row items-center gap-4">
                                <DateRangePanel 
                                    availableDates={availableDates} 
                                    onRangeChange={setSelectedRange} 
                                    currentRange={selectedRange} 
                                />
                                <IntelligenceSearch database={database} />
                                <button 
                                    onClick={() => {
                                        const text = `【DataInsight 戰報】\n日期: ${selectedRange.length > 1 ? selectedRange[selectedRange.length-1]+'~'+selectedRange[0] : selectedRange[0]}\n狀態: ${aggregatedReport.healthStatus==='stable'?'🟢穩定':'🔴異動'}\n總計平均進線: ${aggregatedReport.stats.tickets}件\n重點摘要: ${aggregatedReport.briefSummary}`;
                                        navigator.clipboard.writeText(text);
                                        alert('戰報文字已複製到剪貼簿，可直接貼至通訊軟體！');
                                    }}
                                    className="px-5 py-3 bg-indigo-600 text-white rounded-2xl font-black text-xs shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all active:scale-95 flex items-center gap-2"
                                >
                                    <Icon name="share-2" size={14} /> 一鍵導出戰報
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-screen-2xl mx-auto px-8 mt-10">
                        {aggregatedReport && (
                            <>
                                {/* 頂部決策摘要 */}
                                <div className="mb-12 bg-white rounded-[3.5rem] p-10 border border-slate-100 premium-shadow">
                                    <div className="flex flex-col lg:flex-row gap-12">
                                        <div className="lg:w-1/3 border-r border-slate-50 pr-10">
                                            <div className="flex items-center gap-4 mb-6">
                                                <div className={`status-light w-4 h-4 ${aggregatedReport.healthStatus==='stable'?'status-light-green':aggregatedReport.healthStatus==='warning'?'status-light-yellow':'status-light-red'}`}></div>
                                                <h2 className="text-2xl font-black text-slate-800 uppercase tracking-tight">營運診斷結果</h2>
                                            </div>
                                            <p className="text-sm font-bold text-slate-500 leading-relaxed mb-8">
                                                {aggregatedReport.briefSummary}
                                            </p>
                                            <div className="space-y-3">
                                                {aggregatedReport.actionPoints.map((p, i) => (
                                                    <div key={i} className="flex gap-3 items-start bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                                        <Icon name="target" size={14} className="text-indigo-500 mt-0.5" />
                                                        <span className="text-xs font-bold text-slate-700">{p}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        
                                        <div className="lg:w-2/3 grid grid-cols-2 md:grid-cols-5 gap-6">
                                            <StatCard title="核心進線" value={aggregatedReport.stats.tickets} iconName="file-text" gradient="bg-indigo-600" />
                                            <StatCard title="電話支援" value={aggregatedReport.stats.phoneCalls} iconName="phone-call" gradient="bg-emerald-600" />
                                            <StatCard title="郵件深度" value={aggregatedReport.stats.emails} iconName="mail" gradient="bg-purple-600" />
                                            <StatCard title="預警警示" value={aggregatedReport.stats.alertMails} iconName="alert-triangle" gradient="bg-rose-600" />
                                            <StatCard title="研發聯動" value={aggregatedReport.stats.redmineReplies} iconName="git-merge" gradient="bg-amber-600" />
                                        </div>
                                    </div>
                                </div>

                                {/* 專案診斷矩陣 */}
                                <div className="mb-12">
                                    <div className="flex items-center justify-between mb-8 px-4">
                                        <div className="flex items-center gap-4">
                                            <div className="bg-indigo-600/10 p-3 rounded-2xl"><Icon name="layout-grid" className="text-indigo-600" size={24}/></div>
                                            <h3 className="font-black text-slate-900 text-3xl tracking-tighter">各專案健康診斷矩陣</h3>
                                        </div>
                                        <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest bg-slate-200/50 px-4 py-2 rounded-full">
                                            自動依照異常程度降冪排列
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6">
                                        {chartData.map((d, i) => (
                                            <ProjectDiagnosticCard 
                                                key={d.name} 
                                                name={d.name} 
                                                data={d} 
                                                color={COLORS[i % COLORS.length]} 
                                            />
                                        ))}
                                    </div>
                                </div>

                                {/* 趨勢視覺化 (區間平均趨勢) */}
                                <div className="bg-white p-12 rounded-[4rem] border border-slate-200 premium-shadow">
                                    <div className="flex items-center gap-4 mb-12">
                                        <Icon name="trending-up" className="text-indigo-600" size={32}/>
                                        <h3 className="font-black text-slate-900 text-3xl tracking-tighter">診斷趨勢總量對照 ({selectedRange.length}天維度)</h3>
                                    </div>
                                    <div className="h-[400px] w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={chartData}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 11, fontWeight: 900, fill: '#64748b'}} />
                                                <YAxis axisLine={false} tickLine={false} tick={{fontSize: 11, fontWeight: 900, fill: '#64748b'}} />
                                                <Tooltip contentStyle={{borderRadius: '24px', border: 'none', boxShadow: '0 10px 30px rgba(0,0,0,0.1)'}} />
                                                <Bar dataKey="count" radius={[12, 12, 0, 0]} barSize={40}>
                                                    {chartData.map((e, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} fillOpacity={0.8} />)}
                                                </Bar>
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                            </>
                        )}
                    </main>

                    <footer className="mt-16 text-center opacity-20">
                        <Icon name="shield-check" size={32} className="text-slate-400 mb-4 inline-block" />
                        <p className="text-[10px] font-black tracking-[0.5em] uppercase text-slate-500">DataInsight Matrix v7.5 Expert Diagnostic Edition</p>
                    </footer>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
